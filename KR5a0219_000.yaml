body:
  text: 入壇焚淨穢符於水盂中念天地呪跪啓恭以玄都境妙有神通寸誠難達靈寶香無為清淨一炷遍聞具位臣某誠惶誠恐稽首頓首再拜上啓祖師清微真元妙化天帝清微紫宸大華天帝清微太初天君祖師玄天仁威上帝祖師髙元清真紫虛元君祖師玉華通惠元君祖師泰玄上相正一真君祖師天機內相神功妙濟真君祖師金闕昭凝妙道保仙元君祖師龍光道明元君祖師紫英玉惠元君祖師西華清虛真君祖師青城通惠朱真人雲山保一李真人眉山混隱南真人丹山雷淵黃真人宗師雲萊葉真人古今歷代傳法授道演教諸大宗師恭望師慈俯垂省覽切以靈寶開光祖氣雲羅於五億玄元演妙神功日赫於三千惟道為尊無師不度以今某涓卜今宵朝告斗極專為某順禳星度請福消災伏望振環珮於霄衢聮翩下邁揭綱維於吾道黼黻朝修法衆運誠修齊奉請修齊雲輿散花獻茶臣重誠上啓祖師清微真元妙化天帝清微紫宸大華天帝清微太初天君祖師玄天仁威上帝祖師髙元清真紫虛元君祖師玉華通惠元君祖師泰玄上相正一真君祖師天機內相神功妙濟真君祖師金闕昭凝妙道保仙元君祖師龍光道明元君祖師紫英玉惠元君祖師西華清虛真君祖師青城通惠朱真人雲山保一李真人眉山混隱南真人丹山雷淵黃真人宗師雲萊葉真人古今歷代傳法授道演教諸大宗師恭望師慈俯垂省覽切以元始懸寶珠演度人之妙旨老君升玉局肇解厄之玄科可以保命延年可以消災度厄令傳善士繩繩繼繼以相承為說良緣世世生生而有賴咸歸正道遂免迷津伏念臣宿植善根早親正法謬領行持之職敢後宣揚罔明修進之階惟深憂懼匪賴陶鎔之造曷符效信之機臣今某入意領詞虔恪按格宣行以今瞻斗極而請氣焚符列星壇而法天像地匪繇宗主曷遂開張伏乞差撥將兵下臨壇所蕩除氛穢祗迓真斿或典封緘或專翊䘙分司列職達悃通誠庶獲感孚以昭玄貺臣今澄心遣欲念道思真賴正氣以資扶仗祥光而照燭真火蕩焚於五體靈風披拂於三田變化凡軀融成妙相庶俾飛罡激指運氣合神認真形於虛無渺漠之間如鏡顯相索本命於妙有靈明之景似谷應聲當願風雲澄靜星斗燦明奏告蒙雱霈之恩存念遂感通之願臣誠惶誠恐稽首頓首再拜䖍祝侯命之至謹言念金光咒存神步罡焚符召將斗樞有將職贊璇璣賞善罰惡察過言非玉帝有命威鎮瑤池聞吾呼召風火奔馳降臨壇所母輒稽遲一氣都督雷府分司焚香飛符宣召玄樞飛捷急奏報應使者方央中翊輔玄斗太一天君王志璇璣靈應總真天君龔洪保元昭烈樞靈天君劉潛願聞宣召速降行壇有事委請身披羽服佩帶七星人間禍福報應分明欽凖元降符命告召斗中擎羊上仙使者楊汝明斗中陀羅大仙使者耿妙真平樞上相真君斗機通事舍人聞今召命速赴壇場有事委請天中之神斗曜之精左有汝明右有妙真神通莫測出幽入冥吾今催召速赴壇庭有違吾令如逆帝宸急急凖北帝敕召律令一氣都督雷府分司飛符催召斗中玄樞飛捷急奏報使者方元帥翊輔玄斗太乙天君王元帥璇璣靈應總真天君龔元帥保元昭烈樞靈天君劉元帥斗中擎羊上仙楊使者斗中陀羅大仙耿使者斗樞上相真君斗機通事舍人各各分身化氣下降燈壇檢察事情昭示禍福大彰報應以副禱祈惟神靈通烜赫變化難量無為而成有召立至瞬目揚眉之內徑達九天回頭反掌之間遍周三界所求皆應無願不從以今當職奉為某涓卜今宵朝告斗極請頒恩命專為某祈保平安仰煩斗中仙使齎持符命敬叩北斗璇璣應靈宫奏請北斗九宸上道星君北斗九皇夫人斗中諸靈官衆聯降星壇證盟修奉俾令關告咸賜如言今也召仙仙到請聖聖臨呈化此符合明大心急急如元降律今就煩威力攀屈斗中天醫諸大靈官解厄神吏仍煩關會本佩雷霆諸司官將地祇上將溫元帥正一風火靈官馬元帥玄壇執法趙元帥地司太歲股元帥酆都朗靈關元帥豁落猛吏王元帥諸司副帥傳奏功曹驅邪治病符水仙童將吏主職威靈報應官將一合下降燈壇審實事理佐助行持闡揚教法仍請會同內庭五祝之神速為照勘某身田一切未來吉凶詳行昭示庶令推測有凖報應無差上彰斗法之靈下副衆情之懇以康為信願賜感通吾在壇前立俟昭報隨機赴感天尊各禮師存念如法䘙靈玄斗元精三素朗明萬真啓道掃除災群八威玉策普告萬靈九辰備守攝邪戮精延年無窮壽得長生開明童子備䘙帝庭星光洞照神氣四冥斬馘六天制會酆山縳送朔單敢有稽延金戈束形皇道正明伏匿魂魄與道合真八方威神掃穢除氛七元來降玉簡刋名乘景飛軿上升玉清鳴法鼓二十四通無上三天始元玄三氣太上五靈老君當召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇天帝天真此間土地里域等神臣今升壇朝告謹奏為入意其諸忱悃巳録告聞願得太上十方正真生氣下降流入臣等身中令臣所啓之誠速達徑御太上無極大道昊天玉皇上帝北極紫微大帝北斗九皇星君御前真光朗照天尊然燈念呪上帝有敕發㸃斗燈七王來降救護羣生左輔右弼親現威靈天蓬元帥統領仙兵五雷使者六甲六丁玄武大聖台中三星治病除禍回死作生違敕者死禀敕者生大降威力誅斬妖精三魂附體七魄安寧斗燈一照身宅光明焚降真符降九皇具位臣某初謝百拜奏請中天大聖北斗綱極宫太尉貪狼星皇君北斗靈關宫上宰巨門星皇君北斗紫極宫司空祿存星皇君北斗運天宫遊擊文曲星皇君北斗帝席宫斗君廉貞星皇君北斗上尊宫大常武曲星皇君北斗關㑹宫上帝破軍星皇君洞陽宫玉帝外輔星皇君隱元宫帝真內弼星皇君北斗九皇夫人臣等恭望道慈特賜瑤光降臨壇所鑒臣關告明示吉凶或顯證於燈光或潜彰於物理一心恭默萬願克從臣中謝再拜祗迎聖駕雲輿存真降適伸奏請巳賜光臨再拜致恭淨酒香茶謹伸進獻散花投盆符作占通章具位臣某謹謹虔誠上啓斗極祖師洞真大道元始天尊斗極玄師洞玄大道太上道君斗極真師洞神大道太上老君玉皇大天尊玄穹髙上帝紫微上宫天皇大帝紫微中宫北極大帝北斗髙上玉皇尊帝太微玉帝玄卿大帝上清日宫太陽帝君上清月府太隂皇君北斗綱極宫太尉貪狼星皇君北斗靈關宫上宰巨門星皇君北斗紫極宫司空祿存星皇君北斗運天宫遊擊文曲星皇君北斗帝席宫斗君廉貞星皇君北斗上尊宫太常武曲星皇君北斗關會宫上帝破軍星皇君洞陽宫玉帝外輔星皇君隱元宫帝真內弼星皇君北斗九皇延生夫人天罡大聖萬真節度奎光帝君東西中三斗星君三台華蓋星君四方二十八宿星君十二宫分星君六十甲子星君上清主照某年某月某日建生本命星君大小二運星君大小二限星君祿馬二庫星君胎生八位神將命運限宫照臨真宰三元三官大帝君北極三帥真君北極鎮天真武靈應佑聖真君祖天師泰玄上相正一真君九州都仙太史真君太極仙翁真君華蓋山三仙真君清微玄樞奏告古今歷代演教諸大師真斗中玄樞飛捷急奏報應使者方元帥斗樞上相真君斗機通事舍人斗中擎羊陀羅二仙使者雷霆鄧辛張三大天君上清神烈苟畢二大天君斗中仙靈官衆某靖所隸諸司官將燈壇格降一切羣真恭望道慈洞回昭鑒臣聞清微御運敷正氣於紫微太極開圖煥靈光於北極華蓋映玉垣之邃勾陳羅金闕之崇提挈玄黃運帝車而齊七政統制經緯握天罡而建五行飛豁落於龜圖耀奎光於鳯簡巍巍功德赫赫神靈伏念宿植善根生逢道運飛登而履魂魄未契虛無流吹而溷精神徒紛濁滓過易盈於鈞石功莫積於刀圭曲荷洪慈俾陶玄職臣某奉為某涓卜今宵朝告斗極專為某順禳星度祈保平安以今恭依元降謹請某將進拜紫極玄樞急告心章上聞宸極伏願元皇委照玉宸流光敕五帝四司紀善功於青簡啓三官九府消災難於玄編冀垂擁護之仁下慰翹傾之悃臣誠惶誠恐稽首頓首俯伏案前須待玄恩報應具有章書謹當宣奏宣章熏章就焚於香爐內就焚隨章諸符宣遞符上帝垂恩七真仙靈魁𩲃𩵄䰢明檢鬼營魓𩳐魒降永保安寧急急如律令俯伏默朝三禮謝恩焚謝恩符具位臣某謹重誠上啓斗極祖師洞真大道元始天尊斗極玄師洞玄大道太上道君斗極真師洞神大道太上老君玉皇大天尊玄穹髙上帝紫微上宫天皇大帝紫微中宫北極大帝北斗髙上玉皇尊帝太微玉帝玄卿大帝上清日宫太陽帝君上清月府太隂皇君北斗綱極宫太尉貪狼星皇君北斗靈關上宰巨門星皇君北斗紫微宫司空祿存星皇君北斗運天宫遊擊文曲星皇君北斗帝席宫斗君廉貞星皇君北帝上尊宫太常武曲星皇君北斗關㑹宫上帝破軍星皇君洞陽宫玉帝外輔星皇君隱元宫帝真內弼星皇君北斗九皇延生夫人天罡大聖萬真節度奎光帝君東西中三斗星君三台華蓋星君四方二十八宿星君十二宫分星君六十甲子星君上清主照某年某月某日建生本命星君大小二運星君大小二限星君祿馬二庫星君胎生八位神將命運限宫照臨真宰三元三官大帝君北極三帥真君北極鎮天真武靈應佑聖真君祖天師泰玄上相正一真君九州都仙太史真君太極仙翁真君華蓋山三仙真君清微玄樞奏告古今歷代演教諸大師真斗中玄樞飛捷急奏報應使者方元帥斗樞上相真君斗機通事舍人斗中擎羊陀羅二仙使者雷霆鄧辛張三大天君上清神烈苟畢二大天君斗中仙靈官衆某靖所隸諸司官將燈壇格降一切羣真恭望道慈洞回昭鑒臣聞尊帝瓊宫降晨華而椿齡衍茂玄樞玉省承天芳而芝檢飛流惟通寂感之玄斯契潜昭之妙況九皇垂象流精下映於坤維而八卦成形禀粹上符於乾度仰範圍而有翼每橐籥以無違今某翹勤紫極清淨華堂羅象世之威儀備朝天之科法消災度厄請福延生尚慮臣華穢濁軀濫領朝修之命玄微奧旨罔明授受之方對越乖違存思謬誤冀曲提於後學賴肆赦於前非次願七元守形九靈錫命勒威星而退舍百福來臻敕德曜以臨幾三災消落上願天元澄晏地紀安寧二曜連珠五星合璧時調玉燭邦家隆泰運之基歲慶金穰黎庶遂全生之願則上明天尊大慈之化下副臣等歸命之誠謹啓以聞發願復爐香官使者左右龍虎君侍香諸靈官臣等向來朝告之所自然生金液丹碧之英百靈衆真交會在此香火爐前當願丹誠上格玄貺下敷十方仙童玉女接侍蘭煙傳臣向來所奏之誠速達徑詣太上無極大道昊天玉皇上帝北極紫微大帝中天大聖北斗九皇星君道前清微玄樞奏告儀終
